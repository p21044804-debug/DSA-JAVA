<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardianX AI Web Dashboard Wireframe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Handlee&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Handlee', cursive; /* Primary hand-drawn font */
            background-color: #fcfcfc; /* Light paper color */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .sketch-container {
            background-color: #ffffff;
            border: 2px dashed #a0a0a0; /* Sketchy border */
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.08); /* Subtle shadow */
            padding: 25px;
            max-width: 900px;
            width: 100%;
            border-radius: 10px;
            position: relative; /* For the paper texture effect */
            overflow: hidden;
        }
        .sketch-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><line x1="0" y1="0" x2="100" y2="100" stroke="%23f0f0f0" stroke-width="0.5"/><line x1="0" y1="100" x2="100" y2="0" stroke="%23f0f0f0" stroke-width="0.5"/></svg>'); /* Subtle grid/texture */
            opacity: 0.5;
            pointer-events: none;
        }
        .svg-sketch {
            width: 100%;
            height: auto;
        }
        .sketch-rect {
            fill: none;
            stroke: #333333;
            stroke-width: 2;
            stroke-dasharray: 4 2; /* Dashed line for sketch effect */
            rx: 5; ry: 5;
        }
        .sketch-line {
            stroke: #333333;
            stroke-width: 1.5;
            stroke-dasharray: 2 1;
        }
        .sketch-text {
            fill: #333333;
            font-family: 'Handlee', cursive;
            font-size: 16px;
            font-weight: normal;
        }
        .sketch-heading {
            fill: #333333;
            font-family: 'Permanent Marker', cursive; /* More prominent for headings */
            font-size: 20px;
            font-weight: bold;
        }
        .sketch-icon-placeholder {
            fill: none;
            stroke: #666666;
            stroke-width: 1.5;
            stroke-dasharray: 3 1;
        }
        .scribble {
            stroke: #ff0000; /* Red for emphasis */
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div class="sketch-container">
        <svg class="svg-sketch" viewBox="0 0 850 600">
            <!-- Overall Dashboard Frame -->
            <rect x="20" y="20" width="810" height="560" class="sketch-rect" />

            <!-- Top Navigation Bar -->
            <rect x="20" y="20" width="810" height="50" class="sketch-rect" />
            <text x="40" y="50" class="sketch-text">LOGO</text>
            <text x="150" y="50" class="sketch-text">Event Name</text>
            <rect x="280" y="35" width="100" height="20" class="sketch-rect" />
            <text x="330" y="50" text-anchor="middle" class="sketch-text">Live Status</text>
            <circle cx="680" cy="45" r="8" class="sketch-icon-placeholder" />
            <circle cx="720" cy="45" r="8" class="sketch-icon-placeholder" />
            <circle cx="760" cy="45" r="8" class="sketch-icon-placeholder" />
            <circle cx="800" cy="45" r="8" class="sketch-icon-placeholder" />

            <!-- Left Sidebar -->
            <rect x="20" y="70" width="160" height="510" class="sketch-rect" />
            <text x="35" y="100" class="sketch-text">Dashboard</text>
            <text x="35" y="130" class="sketch-text">Live Map</text>
            <text x="35" y="160" class="sketch-text">Alerts Log</text>
            <text x="35" y="190" class="sketch-text">Personnel Status</text>
            <text x="35" y="220" class="sketch-text">Reports</text>
            <text x="35" y="250" class="sketch-text">Settings</text>

            <line x1="30" y1="280" x2="170" y2="280" class="sketch-line" />

            <text x="35" y="310" class="sketch-text">Current Crowd Density: [Value]</text>
            <text x="35" y="340" class="sketch-text">Active Alerts: [Value]</text>
            <text x="35" y="370" class="sketch-text">Active Incidents: [Value]</text>

            <!-- Main Content Area - Map -->
            <rect x="190" y="80" width="450" height="300" class="sketch-rect" />
            <text x="415" y="220" text-anchor="middle" class="sketch-heading">Real-time Event Map</text>
            <line x1="220" y1="240" x2="620" y2="360" class="sketch-line" />
            <line x1="620" y1="240" x2="220" y2="360" class="sketch-line" />
            <circle cx="300" cy="150" r="10" class="sketch-icon-placeholder" />
            <circle cx="500" cy="280" r="10" class="sketch-icon-placeholder" />
            <circle cx="400" cy="180" r="10" class="sketch-icon-placeholder" />
            <path d="M290 140 Q 295 130, 300 140 Q 305 150, 310 140" class="scribble" /> <!-- Small scribble for emphasis -->


            <!-- Live Alerts Feed (Right Column, Top) -->
            <rect x="650" y="80" width="170" height="200" class="sketch-rect" />
            <text x="735" y="105" text-anchor="middle" class="sketch-heading">Live Alerts Feed</text>
            <line x1="660" y1="120" x2="810" y2="120" class="sketch-line" />
            <text x="665" y="135" class="sketch-text">Alert Type - Loc</text>
            <text x="665" y="150" class="sketch-text">Sev | Time</text>
            <line x1="660" y1="165" x2="810" y2="165" class="sketch-line" />
            <text x="665" y="180" class="sketch-text">Alert Type - Loc</text>
            <text x="665" y="195" class="sketch-text">Sev | Time</text>
            <line x1="660" y1="210" x2="810" y2="210" class="sketch-line" />
            <text x="665" y="225" class="sketch-text">...</text>

            <!-- Key Metrics/Summary (Right Column, Bottom) -->
            <rect x="650" y="290" width="170" height="280" class="sketch-rect" />
            <text x="735" y="315" text-anchor="middle" class="sketch-heading">Key Metrics</text>
            <line x1="660" y1="330" x2="810" y2="330" class="sketch-line" />
            <text x="665" y="345" class="sketch-text">Current Est. Crowd: [Val]</text>
            <text x="665" y="365" class="sketch-text">Occupancy %: [Val]</text>
            <text x="665" y="385" class="sketch-text">Flow Rate: [Val]</text>
            <line x1="660" y1="400" x2="810" y2="400" class="sketch-line" />
            <text x="665" y="420" class="sketch-text">Incident Summary:</text>
            <text x="665" y="440" class="sketch-text">Total Alerts: [Val]</text>
            <text x="665" y="460" class="sketch-text">Resolved: [Val]</text>
            <text x="665" y="480" class="sketch-text">Pending: [Val]</text>
            <line x1="660" y1="495" x2="810" y2="495" class="sketch-line" />
            <text x="665" y="515" class="sketch-text">System Status: Operational</text>
        </svg>
    </div>
</body>
</html>
